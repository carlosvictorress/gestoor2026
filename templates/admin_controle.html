{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-gear-fill me-2"></i>Controle Geral do Sistema</h2>
    
    <div class="card shadow border-0">
        <form method="POST" action="{{ url_for('painel_controle_sistema') }}" class="card-body p-4">
            
            <div class="mb-4 p-3 bg-light rounded border shadow-sm">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="manutencao" id="manutencao" 
                           {% if config.manutencao_ativa %}checked{% endif %}>
                    <label class="form-check-label fw-bold" for="manutencao">ATIVAR MODO DE MANUTENÇÃO</label>
                </div>
                <small class="text-muted d-block mt-1">
                    Ao ativar, apenas administradores poderão navegar no sistema. Usuários comuns verão uma tela de aviso.
                </small>
            </div>

            <div class="mb-4 p-3 bg-white rounded border shadow-sm">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="exibir_alerta" id="exibir_alerta" 
                           {% if config.exibir_alerta %}checked{% endif %}>
                    <label class="form-check-label fw-bold" for="exibir_alerta">EXIBIR ALERTA POP-UP</label>
                </div>
                
                <label class="form-label small text-uppercase fw-bold text-secondary">Mensagem Personalizada</label>
                <textarea name="mensagem_alerta" class="form-control" rows="4" 
                          placeholder="Ex: Bem-vindo ao sistema! Não esqueça de atualizar os dados.">{{ config.mensagem_alerta or '' }}</textarea>
                
                <small class="text-muted d-block mt-2">
                    <i class="bi bi-info-circle me-1"></i>
                    A mensagem aparecerá apenas uma vez por dia no primeiro acesso de cada usuário.
                </small>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                <button type="submit" class="btn btn-primary px-5 rounded-pill shadow-sm">
                    <i class="bi bi-check-circle me-2"></i>Salvar Configurações
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
