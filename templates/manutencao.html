<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema em Manutenção - GESTOR 360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .maintenance-card {
            max-width: 500px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .icon-box {
            font-size: 4rem;
            color: #0d6efd;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="card maintenance-card mx-auto p-5">
        <div class="card-body">
            <div class="icon-box">
                <i class="bi bi-tools"></i>
            </div>
            <h2 class="fw-bold text-dark mb-3">Estamos em Manutenção</h2>
            <p class="text-muted mb-4">
                O sistema está passando por atualizações importantes para melhorar sua experiência. 
                Voltaremos a operar normalmente em breve.
            </p>
            <div class="d-grid">
                <a href="{{ url_for('logout') }}" class="btn btn-primary rounded-pill px-4">
                    Sair do Sistema
                </a>
            </div>
        </div>
    </div>
    <p class="mt-4 text-muted small">&copy; 2026 Gestor 360 - Inteligência em Gestão Pública</p>
</div>

</body>
</html>
