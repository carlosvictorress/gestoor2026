<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Ponto Digital - Gestoor 360º</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
        }
        body {
            background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Modal Inicial Fullscreen */
        #initialModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #FFFFFF 0%, #F2F2F7 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #big-clock {
            font-size: 4.5rem;
            font-weight: 300;
            color: #1d1d1f;
            letter-spacing: -2px;
            margin-bottom: 0;
            font-variant-numeric: tabular-nums;
        }
        #current-date {
            font-size: 1.1rem;
            color: #86868b;
            margin-bottom: 50px;
            text-transform: capitalize;
        }

        .btn-apple-main {
            background: var(--apple-blue);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.2rem;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.2);
        }

        .selo-portaria {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #AEAEB2;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Interface da Câmera */
        .camera-wrapper {
            position: relative;
            height: 100vh;
            width: 100%;
            background: #000;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Botões Flutuantes (Floating Action Buttons) */
        .fab-container {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            pointer-events: none;
        }
        .fab-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            pointer-events: auto;
            transition: transform 0.2s;
        }
        .fab-btn:active { transform: scale(0.9); }
        .fab-entrada { background: var(--apple-green); }
        .fab-saida { background: var(--apple-red); }
        .fab-btn i { font-size: 1.8rem; margin-bottom: 2px; }

        /* Seletor de Local Flutuante */
        .location-picker {
            position: absolute;
            top: 60px;
            left: 20px;
            right: 20px;
            z-index: 100;
        }
        .form-select-apple {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-weight: 600;
            color: #1d1d1f;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Máscara e Mensagens */
        .face-guide {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 320px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 130px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
        }
        #feedback-msg {
            position: absolute;
            top: 25%;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Fallback CPF */
        #cpf-section {
            position: absolute;
            bottom: 0;
            background: white;
            width: 100%;
            padding: 30px 20px;
            border-radius: 30px 30px 0 0;
            display: none;
            z-index: 1000;
        }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="initialModal">
        <h1 id="big-clock">00:00:00</h1>
        <p id="current-date">...</p>
        
        <button class="btn-apple-main" onclick="startApp()">
            BATER PONTO
        </button>

        <div class="selo-portaria">
            <i class="bi bi-shield-check-fill text-success"></i>
            Conforme Portaria MTP nº 671/2021
        </div>
    </div>

    <form id="pontoForm" method="POST" action="{{ url_for('registrar_ponto') }}">
        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">
        <input type="hidden" id="foto_b64" name="foto_b64">
        <input type="hidden" id="tipo" name="tipo">
        <input type="hidden" id="cpf_manual" name="cpf_manual">

        <div class="camera-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div class="face-guide"></div>
            <div id="feedback-msg">Aguardando local...</div>

            <div class="location-picker">
                <select class="form-select form-select-apple" id="escola_id" name="escola_id" required onchange="handleLocationChange(this)">
                    <option value="" selected disabled>Selecione seu local de trabalho</option>
                    {% for escola in escolas %}
                        <option value="{{ escola.id }}">📍 {{ escola.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="fab-container" id="biometry-buttons">
                <button type="button" class="fab-btn fab-entrada" onclick="captureAndSubmit('entrada')">
                    <i class="bi bi-geo-alt-fill"></i>
                    ENTRADA
                </button>
                <button type="button" class="fab-btn fab-saida" onclick="captureAndSubmit('saida')">
                    <i class="bi bi-door-open-fill"></i>
                    SAÍDA
                </button>
            </div>
        </div>

        <div id="cpf-section">
            <div class="alert alert-danger border-0 rounded-4 mb-3" style="font-size: 0.85rem;">
                <b>Biometria não reconhecida.</b><br>
                Use o CPF e procure o RH para atualizar sua foto.
            </div>
            <input type="tel" class="form-control form-control-lg mb-3 border-0 bg-light" id="cpf_visible" placeholder="000.000.000-00" style="border-radius: 12px;">
            <div class="row g-2">
                <div class="col-6"><button type="button" class="btn btn-dark w-100 py-3 rounded-4" onclick="captureAndSubmit('entrada', true)">ENTRADA</button></div>
                <div class="col-6"><button type="button" class="btn btn-dark w-100 py-3 rounded-4" onclick="captureAndSubmit('saida', true)">SAÍDA</button></div>
            </div>
        </div>
    </form>

    <div class="loading-overlay" id="loading">
        <div class="spinner-border text-primary mb-3"></div>
        <div class="fw-bold">Processando Registro...</div>
    </div>

    <script>
        let attemptCount = 0;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // Relógio com Segundos
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('big-clock').textContent = `${h}:${m}:${s}`;
            document.getElementById('current-date').textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function startApp() {
            document.getElementById('initialModal').style.transform = 'translateY(-100%)';
            initCamera();
            initGPS();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Acesse a câmera para registrar o ponto.");
            }
        }

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    document.getElementById('latitude').value = p.coords.latitude;
                    document.getElementById('longitude').value = p.coords.longitude;
                });
            }
        }

        // Lógica automática ao escolher local
        function handleLocationChange(select) {
            if(select.value) {
                document.getElementById('feedback-msg').innerHTML = "<span class='badge bg-primary px-3 py-2'>LOCAL DEFINIDO!</span><br><small class='text-white-50'>Escolha a ação nos botões flutuantes</small>";
                // Feedback visual de vibração simples se suportado
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            }
        }

        function captureAndSubmit(tipoPonto, isManual = false) {
            if (!document.getElementById('escola_id').value) {
                alert("Selecione o local antes!");
                return;
            }

            if (isManual) {
                const cpfVal = document.getElementById('cpf_visible').value;
                if (!cpfVal) { alert("Informe seu CPF"); return; }
                document.getElementById('cpf_manual').value = cpfVal;
            }

            document.getElementById('loading').style.display = 'flex';

            // Captura
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            document.getElementById('foto_b64').value = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('tipo').value = tipoPonto;

            // Simulação de controle de tentativas (lógica de front-end)
            attemptCount++;
            
            // Se for a segunda tentativa sem sucesso (simulado), abre o CPF
            // No mundo real, você enviaria via AJAX e checaria o retorno, 
            // mas como mantemos o submit direto, aqui mostramos o fluxo:
            if (attemptCount >= 2 && !isManual) {
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('biometry-buttons').style.display = 'none';
                    document.getElementById('cpf-section').style.display = 'block';
                    document.querySelector('.face-guide').style.borderColor = 'red';
                    document.getElementById('feedback-msg').innerText = "BIOMETRIA FALHOU";
                }, 1000);
            } else {
                document.getElementById('pontoForm').submit();
            }
        }

        // Máscara CPF
        document.getElementById('cpf_visible').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = v;
        });
    </script>
</body>
</html>
