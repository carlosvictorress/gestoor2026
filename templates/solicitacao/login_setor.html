<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Veículos - Valença do Piauí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-blue-custom { background-color: #4A76B8; }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden">

    <div class="w-1/2 bg-blue-custom flex flex-col justify-center items-center p-12 text-white">
        <h1 class="text-3xl md:text-4xl font-bold mb-8 text-center">SISTEMA PARA AGENDAR VEÍCULO</h1>
        
        <form action="{{ url_for('solicitacao.login_setor') }}" method="POST" class="w-full max-w-sm">
            <div class="flex shadow-lg rounded-lg overflow-hidden bg-white">
                <input type="text" 
                       name="codigo_setor" 
                       placeholder="Digite o código único do setor" 
                       required
                       class="w-full px-4 py-3 text-gray-700 focus:outline-none">
                <button type="submit" class="bg-amber-400 hover:bg-amber-500 px-6 py-3 text-white font-bold text-xl">
                    >
                </button>
            </div>
        </form>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="mt-4 text-white font-semibold bg-red-500 px-4 py-2 rounded">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="w-1/2 bg-white flex justify-center items-center p-12">
        <img src="{{ url_for('static', filename='img/brasao_valenca.png') }}" 
             alt="Brasão Valença do Piauí" 
             class="max-w-xs md:max-w-sm object-contain">
    </div>

</body>
</html>
