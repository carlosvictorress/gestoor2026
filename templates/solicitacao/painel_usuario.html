{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-primary mb-0">Solicitação de Transporte</h3>
            <p class="text-muted">Setor: <span class="badge bg-light text-dark border">{{ session.get('secretaria') }}</span></p>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="card-title text-primary"><i class="fas fa-calendar-alt me-2"></i>Agenda de Disponibilidade</h5>
                </div>
                <div class="card-body">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0"><i class="fas fa-edit me-2"></i>Nova Solicitação</h5>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('solicitacao.painel_usuario') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Data Solicitada</label>
                            <input type="date" name="data_solicitada" class="form-control form-control-lg" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Saída</label>
                                <input type="time" name="horario_saida" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Chegada</label>
                                <input type="time" name="horario_chegada" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Motivo da Solicitação</label>
                            <textarea name="motivo" class="form-control" rows="3" placeholder="Descreva brevemente o destino e finalidade..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Nome do Responsável</label>
                            <input type="text" name="responsavel" class="form-control" placeholder="Quem acompanhará o veículo?" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
                            <i class="fas fa-paper-plane me-2"></i>Confirmar Solicitação
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/pt-br.js'></script>

<style>
    /* Ajustes finos para um visual mais clean */
    .card { border-radius: 12px; }
    .form-control { border-radius: 8px; border: 1px solid #dee2e6; }
    .btn-primary { border-radius: 8px; background-color: #0d6efd; }
    #calendar { padding: 10px; }
    .fc .fc-toolbar-title { font-size: 1.2rem !important; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'pt-br',
            height: 450,
            headerToolbar: {
                left: 'prev,next',
                center: 'title',
                right: 'today'
            },
            events: '/solicitacao/api/eventos'
        });
        calendar.render();
    });
</script>
{% endblock %}
